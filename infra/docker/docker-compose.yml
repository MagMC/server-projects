# Build/run the dashboard via Docker so no Node/Go toolchain is needed on the host.
#
#   Production (static dashboard on :7272 + data API behind its /api proxy):
#     docker compose -f infra/docker/docker-compose.yml up -d --build dashboard-api dashboard
#
#   Development (Vite dev server + hot reload on :5173, source bind-mounted):
#     docker compose -f infra/docker/docker-compose.yml --profile dev up dashboard-dev
#
# The dashboard build context is the repo root (pnpm workspace); the API build
# context is its own self-contained Go module dir.

services:
  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    image: server-dashboard:latest
    container_name: server-dashboard
    ports:
      - "7272:80"
    restart: unless-stopped
    depends_on:
      - dashboard-api
    networks:
      - dashboard-net

  # Read-only data backend (Go). Reachable only via the dashboard nginx /api/
  # proxy on the shared network — no published host port, so it's off the LAN.
  dashboard-api:
    build:
      context: ../../apps/dashboard-api
      dockerfile: Dockerfile
    image: server-dashboard-api:latest
    container_name: server-dashboard-api
    restart: unless-stopped
    expose:
      - "3001"
    group_add:
      - "988" # host 'docker' gid, so the non-root 'app' user can read docker.sock
    environment:
      PORT: "3001"
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      # Each shows as its own bar: / (root SSD), /mnt/data (NVMe), HDD.
      DISK_MOUNTS: /host/root,/host/root/mnt/data,/host/root/media/plex-drive
      DOCKER_HOST: unix:///var/run/docker.sock
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      K3S_SERVER: https://host.docker.internal:6443 # override kubeconfig's 127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/rancher/k3s/k3s.yaml:/etc/rancher/k3s/k3s.yaml:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - dashboard-net

  dashboard-dev:
    image: node:20-alpine
    profiles: ["dev"]
    working_dir: /repo
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter dashboard dev --host"
    ports:
      - "5173:5173"
    volumes:
      - ../..:/repo
      # Keep node_modules inside named volumes so the host stays clean.
      - dashboard-root-modules:/repo/node_modules
      - dashboard-app-modules:/repo/apps/dashboard/node_modules

networks:
  dashboard-net:

volumes:
  dashboard-root-modules:
  dashboard-app-modules:
