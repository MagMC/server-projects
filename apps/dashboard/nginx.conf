server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the dashboard-api container (single origin → no
    # CORS). Resolve the name at runtime via Docker's embedded DNS so nginx still
    # starts if the API isn't up yet. The rewrite strips the /api prefix.
    location /api/ {
        limit_except GET HEAD { deny all; }   # read-only surface for now
        resolver 127.0.0.11 valid=10s;
        set $api_upstream dashboard-api:3001;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 15s;
    }

    # SPA fallback: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
